name: Build Android APK

on:
  push:
    branches:
      - main
      - master
      - dev-ui-overhaul

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Set these repository secrets to produce properly signed release APKs:
      #   ANDROID_KEYSTORE_BASE64   base64 of the release keystore (base64 -w0 release.keystore)
      #   ANDROID_KEYSTORE_PASSWORD keystore password
      #   ANDROID_KEY_ALIAS         key alias
      #   ANDROID_KEY_PASSWORD      key password
      # Without them the workflow falls back to a debug build (NOT suitable for
      # real distribution — the debug keystore is public in this repo).
      HAS_RELEASE_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Run Tests
        run: npm run test:run

      - name: Patch broken dependencies (Proguard & JCenter fix)
        run: |
          find node_modules -name "build.gradle" -exec sed -i 's/proguard-android.txt/proguard-android-optimize.txt/g' {} +
          find node_modules -name "build.gradle" -exec sed -i 's/jcenter()/mavenCentral()/g' {} +


      - name: Build Web Assets
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Permanent Keystore
        run: |
          mkdir -p ~/.config/.android
          cp android/debug.keystore ~/.config/.android/debug.keystore

      - name: Decode release keystore
        if: env.HAS_RELEASE_KEYSTORE == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > ${{ runner.temp }}/release.keystore
          echo "ANDROID_KEYSTORE_PATH=${{ runner.temp }}/release.keystore" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build signed release APK
        if: env.HAS_RELEASE_KEYSTORE == 'true'
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease
          echo "APK_SOURCE=app/build/outputs/apk/release/app-release.apk" >> $GITHUB_ENV

      - name: Build debug APK (no release keystore configured)
        if: env.HAS_RELEASE_KEYSTORE != 'true'
        working-directory: android
        run: |
          ./gradlew assembleDebug
          echo "APK_SOURCE=app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_ENV

      - name: Extract version from package.json
        id: package_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          if [ "${{ github.ref_name }}" == "main" ] || [ "${{ github.ref_name }}" == "master" ]; then
            mv android/${{ env.APK_SOURCE }} android/vitemonjager-${{ env.APP_VERSION }}.apk
            echo "APK_NAME=vitemonjager-${{ env.APP_VERSION }}.apk" >> $GITHUB_ENV
            echo "RELEASE_TAG=v${{ env.APP_VERSION }}" >> $GITHUB_ENV
            echo "RELEASE_NAME=Jäger Tracker v${{ env.APP_VERSION }}" >> $GITHUB_ENV
            echo "IS_LATEST=true" >> $GITHUB_ENV
          else
            mv android/${{ env.APK_SOURCE }} android/vitemonjager-dev.apk
            echo "APK_NAME=vitemonjager-dev.apk" >> $GITHUB_ENV
            echo "RELEASE_TAG=dev-latest" >> $GITHUB_ENV
            echo "RELEASE_NAME=Jäger Tracker (DEV BUILD)" >> $GITHUB_ENV
            echo "IS_LATEST=false" >> $GITHUB_ENV
          fi

      - name: Create Release and Upload APK
        uses: ncipollo/release-action@v1
        with:
          artifacts: "android/${{ env.APK_NAME }}"
          tag: "${{ env.RELEASE_TAG }}"
          name: "${{ env.RELEASE_NAME }}"
          body: |
            ## Build from branch: ${{ github.ref_name }}
            This is an automated build for testing purposes.

            [View Full Changelog](https://github.com/Areakend/VMJ/blob/main/CHANGELOG.md)

            Cheers! 🥂
          allowUpdates: true
          makeLatest: ${{ env.IS_LATEST }}
